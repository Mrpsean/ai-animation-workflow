<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixar Animation Workflow</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F4EF; color: #1a1a1a; min-height: 100vh; padding: 32px 16px 64px; }
.wrap { max-width: 800px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 8px; color: #1a1a1a; }
.subtitle { font-size: 14px; color: rgba(0,0,0,0.45); margin-bottom: 28px; }

.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; }
.leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(0,0,0,0.45); }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.flow { position: relative; }
svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.node-group { cursor: pointer; }
.node-group:hover rect { opacity: 0.85; }

.tooltip {
  position: absolute;
  background: #ffffff;
  border: 1px solid #cccccc;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  line-height: 1.6;
  max-width: 300px;
  pointer-events: none;
  color: #111111;
  display: none;
  z-index: 10;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.tooltip.show { display: block; }
.tooltip strong { font-weight: 600; display: block; margin-bottom: 6px; font-size: 13px; color: #000000; }
.tooltip .why { display: block; margin-top: 6px; font-size: 12px; color: #666; font-style: italic; }
.phase-label { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.parallel-label { font-size: 10px; letter-spacing: 0.03em; text-transform: uppercase; }
.step-num { font-size: 11px; font-weight: 600; }
.hint { font-size: 12px; color: rgba(0,0,0,0.4); margin-top: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Pixar Animation Workflow</h1>
  <p class="subtitle">Click any node for details. Steps marked ⬅➡ happen at the same time.</p>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#7F77DD"></div> Sean (strategy)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#1D9E75"></div> Claude (AI)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#BA7517"></div> Nano-Banana</div>
    <div class="leg-item"><div class="leg-dot" style="background:#185FA5"></div> Video tool</div>
    <div class="leg-item"><div class="leg-dot" style="background:#993556"></div> Review / decision</div>
    <div class="leg-item"><div class="leg-dot" style="background:#888780"></div> Output</div>
  </div>

  <div class="flow">
    <svg width="100%" viewBox="0 0 680 1900" id="flowsvg">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- ========== PHASE 1 — RESEARCH ========== -->
      <text class="phase-label" x="40" y="32" fill="rgba(0,0,0,0.35)">Phase 1 — Research</text>

      <!-- Parallel indicator -->
      <text class="parallel-label" x="280" y="52" text-anchor="middle" fill="#993556" font-weight="500">⬅ DO BOTH AT THE SAME TIME ➡</text>

      <!-- Step 1a -->
      <text class="step-num" x="52" y="74" fill="#7F77DD">1a</text>
      <g class="node-group" data-tip="Find a Pixar-style organic video performing well on TikTok, Reels or YouTube Shorts. Download it.<span class='why'>WHY: This is the structural blueprint — the pacing, arc, and scene count of your ad will be based on this video.</span>" onclick="tip(this,event)">
        <rect x="40" y="60" width="280" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
        <text x="180" y="82" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Find reference video</text>
        <text x="180" y="99" text-anchor="middle" font-size="11" fill="#534AB7">TikTok / Reels / YouTube</text>
      </g>

      <!-- Step 1b -->
      <text class="step-num" x="372" y="74" fill="#7F77DD">1b</text>
      <g class="node-group" data-tip="Screenshot any frame with a character or visual style you like. You don't need the whole video — just the frames that spark an idea for how YOUR characters should look.<span class='why'>WHY: These screenshots become the visual reference that Claude uses to write Nano-Banana prompts later. Without them, Claude guesses the style.</span>" onclick="tip(this,event)">
        <rect x="360" y="60" width="280" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
        <text x="500" y="82" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Screenshot inspiration frames</text>
        <text x="500" y="99" text-anchor="middle" font-size="11" fill="#534AB7">Character / visual style ideas</text>
      </g>

      <!-- Arrows down from 1a and 1b -->
      <line x1="180" y1="112" x2="180" y2="144" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>
      <line x1="500" y1="112" x2="500" y2="144" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <!-- Parallel indicator -->
      <text class="parallel-label" x="280" y="142" text-anchor="middle" fill="#993556" font-weight="500">⬅ DO BOTH AT THE SAME TIME ➡</text>

      <!-- Step 1c -->
      <text class="step-num" x="52" y="162" fill="#7F77DD">1c</text>
      <g class="node-group" data-tip="Upload the reference video to Google AI Studio. Paste the forensic breakdown prompt (see prompts.md). Save the full output — this becomes the structural blueprint for your script.<span class='why'>WHY: Claude can't watch videos. Google AI Studio can. It extracts the scene structure, timing, emotional arc, and dialogue breakdown that Claude needs to write the script.</span>" onclick="tip(this,event)">
        <rect x="40" y="148" width="280" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
        <text x="180" y="170" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Google AI Studio breakdown</text>
        <text x="180" y="187" text-anchor="middle" font-size="11" fill="#534AB7">Structure / arc / pacing</text>
      </g>

      <!-- Step 1d -->
      <text class="step-num" x="372" y="162" fill="#1D9E75">1d</text>
      <g class="node-group" data-tip="Upload the inspiration screenshots into Claude — NOT Nano-Banana. Claude looks at them so it understands the visual style you want. Later, when you ask for Nano-Banana prompts, Claude will write them to match this style.<span class='why'>WHY: If you skip this, Claude has no visual reference and will guess the style. The prompts come out generic instead of matching your inspiration.</span>" onclick="tip(this,event)">
        <rect x="360" y="148" width="280" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
        <text x="500" y="170" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Upload screenshots to Claude</text>
        <text x="500" y="187" text-anchor="middle" font-size="11" fill="#0F6E56">Not Nano-Banana — Claude first</text>
      </g>

      <!-- Merge arrows into Phase 1.5 -->
      <line x1="180" y1="200" x2="180" y2="236" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
      <line x1="500" y1="200" x2="500" y2="236" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
      <line x1="180" y1="236" x2="330" y2="236" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
      <line x1="500" y1="236" x2="350" y2="236" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
      <line x1="340" y1="236" x2="340" y2="264" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <!-- ========== PHASE 1.5 — CLAUDE SETUP (NEW) ========== -->
      <text class="phase-label" x="40" y="286" fill="rgba(0,0,0,0.35)">Phase 1.5 — Claude project setup (first time only)</text>

      <text class="step-num" x="152" y="310" fill="#1D9E75">2</text>
      <g class="node-group" data-tip="IF you are starting a new Claude project or this is your first time: feed Claude all brand knowledge BEFORE writing the script. Upload: product info, previous scripts, brand voice examples, the Supply Life box character reference, and any existing ad breakdowns.<br><br>If your Claude project is already trained on Supply Life, skip this step.<span class='why'>WHY: Without brand context, Claude will write a generic health ad. It needs to know the product, the price point (£180+), the test mechanics, the results format (red/amber/green), and the tone of previous winning ads.</span>" onclick="tip(this,event)">
        <rect x="140" y="296" width="400" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
        <text x="340" y="318" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Prime Claude with brand knowledge</text>
        <text x="340" y="335" text-anchor="middle" font-size="11" fill="#0F6E56">Product info · previous scripts · brand voice · skip if already done</text>
      </g>

      <line x1="340" y1="348" x2="340" y2="380" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <!-- ========== PHASE 2 — SCRIPT ========== -->
      <text class="phase-label" x="40" y="400" fill="rgba(0,0,0,0.35)">Phase 2 — Script</text>

      <text class="step-num" x="152" y="424" fill="#1D9E75">3</text>
      <g class="node-group" data-tip="Claude reads the Google AI Studio breakdown AND views the inspiration screenshots. It combines the structure from the breakdown with the visual style from the screenshots and Supply Life brand knowledge to write the script.<br><br>Output: a script with one punchy line per scene. Typically 8-11 scenes, 55-70 seconds total.<span class='why'>WHY: The breakdown gives Claude the scene structure and pacing. The screenshots give it the visual direction. Together, this stops Claude from writing a generic explainer.</span>" onclick="tip(this,event)">
        <rect x="140" y="410" width="400" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
        <text x="340" y="432" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Claude writes the script</text>
        <text x="340" y="449" text-anchor="middle" font-size="11" fill="#0F6E56">Breakdown structure + screenshot visuals + brand knowledge</text>
      </g>

      <line x1="340" y1="462" x2="340" y2="490" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <text class="step-num" x="202" y="504" fill="#993556">4</text>
      <g class="node-group" data-tip="Sean reviews the script and locks it. The editor receives the locked version — they never write or edit the script themselves. Any changes go through Sean/Harry first." onclick="tip(this,event)">
        <rect x="190" y="490" width="300" height="52" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
        <text x="340" y="512" text-anchor="middle" font-size="13" font-weight="500" fill="#4B1528">Sean reviews &amp; locks script</text>
        <text x="340" y="529" text-anchor="middle" font-size="11" fill="#72243E">Handed to editor as locked doc</text>
      </g>

      <line x1="340" y1="542" x2="340" y2="574" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <!-- ========== PHASE 3 — SUPPLY LIFE BOX CHARACTER ========== -->
      <text class="phase-label" x="40" y="596" fill="rgba(0,0,0,0.35)">Phase 3 — Supply Life box character</text>

      <text class="step-num" x="152" y="620" fill="#BA7517">5</text>
      <g class="node-group" data-tip="Upload the real Supply Life product image to Nano-Banana. Prompt: 'Turn this into a Pixar-style animated character with arms and legs.' Generate at least 3 versions. Pick the strongest. Save — this becomes your character reference for every scene.<span class='why'>WHY: The Supply Life box appears in multiple scenes. You need one consistent reference image so it looks the same throughout the ad. Generate the box character FIRST, separately from villain/food characters.</span>" onclick="tip(this,event)">
        <rect x="140" y="606" width="400" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
        <text x="340" y="628" text-anchor="middle" font-size="13" font-weight="500" fill="#412402">Upload product → Nano-Banana</text>
        <text x="340" y="645" text-anchor="middle" font-size="11" fill="#854F0B">"Turn this into a Pixar character" · at least 3 versions</text>
      </g>

      <line x1="340" y1="658" x2="340" y2="686" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <text class="step-num" x="202" y="700" fill="#993556">6</text>
      <g class="node-group" data-tip="Review the box character output. Check: arms/legs colour (should be cardboard, NOT gold/metallic), branding text, proportions, expression.<br><br>If wrong — screenshot the bad output, go back to Claude, describe what's wrong specifically, get a refined prompt, regenerate in Nano-Banana.<br><br>If right — save this image. You will upload it as a reference in Nano-Banana for every future scene that includes the box." onclick="tip(this,event)">
        <rect x="190" y="686" width="300" height="52" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
        <text x="340" y="708" text-anchor="middle" font-size="13" font-weight="500" fill="#4B1528">Happy with box character?</text>
        <text x="340" y="725" text-anchor="middle" font-size="11" fill="#72243E">Check limb colour · branding · expression</text>
      </g>

      <line x1="490" y1="712" x2="560" y2="712" stroke="#993556" stroke-width="0.8"/>
      <line x1="560" y1="712" x2="560" y2="632" stroke="#993556" stroke-width="0.8"/>
      <line x1="560" y1="632" x2="542" y2="632" stroke="#993556" stroke-width="0.8" marker-end="url(#arr)"/>
      <text x="566" y="672" font-size="11" fill="#993556">No — screenshot</text>
      <text x="566" y="686" font-size="11" fill="#993556">→ back to Claude</text>
      <text x="566" y="700" font-size="11" fill="#993556">→ refine prompt</text>

      <line x1="340" y1="738" x2="340" y2="770" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>
      <text x="350" y="758" font-size="11" fill="rgba(0,0,0,0.35)">Yes — save as reference</text>

      <!-- ========== PHASE 4 — SCENE IMAGES ========== -->
      <text class="phase-label" x="40" y="792" fill="rgba(0,0,0,0.35)">Phase 4 — Scene images (villain characters + all scenes)</text>

      <text class="step-num" x="152" y="820" fill="#1D9E75">7</text>
      <g class="node-group" data-tip="For every line of the script, ask Claude:<br><br>'Give me 3 creative different visual variations for a Nano-Banana image prompt for this script line: [paste the line]'<br><br>'Image prompt' = the text you will paste into Nano-Banana to generate the still image for that scene. Ask for at least 3 — you can ask for more if none are strong enough.<br><br>TIP: Generate all villain/food characters first as standalone references (e.g. the Peas character, the Oats character). Then place those character references into scene-specific backgrounds.<span class='why'>WHY: Asking for 3+ options means you always have creative choices. The strongest option is rarely the first one Claude suggests. Generating characters separately first gives you a consistent reference you can reuse across multiple scenes.</span>" onclick="tip(this,event)">
        <rect x="140" y="806" width="400" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
        <text x="340" y="828" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Ask Claude for 3+ image prompts</text>
        <text x="340" y="845" text-anchor="middle" font-size="11" fill="#0F6E56">Per script line — at least 3, can ask for more</text>
      </g>

      <line x1="340" y1="858" x2="340" y2="886" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <text class="step-num" x="202" y="900" fill="#993556">8</text>
      <g class="node-group" data-tip="Read all options carefully before choosing. The strongest visual is not always predictable. Look for: does the character clearly represent the food? Is the action instantly legible? Would you understand the scene without the voiceover?" onclick="tip(this,event)">
        <rect x="190" y="886" width="300" height="52" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
        <text x="340" y="908" text-anchor="middle" font-size="13" font-weight="500" fill="#4B1528">Pick strongest visual concept</text>
        <text x="340" y="925" text-anchor="middle" font-size="11" fill="#72243E">Read all options — not always predictable</text>
      </g>

      <line x1="340" y1="938" x2="340" y2="966" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <text class="step-num" x="152" y="980" fill="#BA7517">9</text>
      <g class="node-group" data-tip="Paste Claude's chosen prompt into Nano-Banana Pro at 2K quality. Generate 2-3 versions. Keep all key action centred in frame (important — edges get cropped on mobile).<br><br>If the scene includes the Supply Life box: upload your saved box character reference into Nano-Banana's reference feature so it stays visually consistent." onclick="tip(this,event)">
        <rect x="140" y="966" width="400" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
        <text x="340" y="988" text-anchor="middle" font-size="13" font-weight="500" fill="#412402">Generate still in Nano-Banana Pro</text>
        <text x="340" y="1005" text-anchor="middle" font-size="11" fill="#854F0B">Pro · 2K quality · action centred · use character refs</text>
      </g>

      <line x1="340" y1="1018" x2="340" y2="1046" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <text class="step-num" x="202" y="1060" fill="#993556">10</text>
      <g class="node-group" data-tip="Check: wrong colours? Missing elements? Character looks off? Action not centred?<br><br>If wrong — screenshot the bad output, go back to Claude, describe the specific problem. Claude will rewrite the prompt to fix it. Then regenerate in Nano-Banana.<br><br>Do NOT just regenerate the same prompt — that gives you variations of the same mistake." onclick="tip(this,event)">
        <rect x="190" y="1046" width="300" height="52" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
        <text x="340" y="1068" text-anchor="middle" font-size="13" font-weight="500" fill="#4B1528">Happy with still?</text>
        <text x="340" y="1085" text-anchor="middle" font-size="11" fill="#72243E">Screenshot problem → Claude fixes prompt</text>
      </g>

      <line x1="490" y1="1072" x2="560" y2="1072" stroke="#993556" stroke-width="0.8"/>
      <line x1="560" y1="1072" x2="560" y2="832" stroke="#993556" stroke-width="0.8"/>
      <line x1="560" y1="832" x2="542" y2="832" stroke="#993556" stroke-width="0.8" marker-end="url(#arr)"/>
      <text x="566" y="956" font-size="11" fill="#993556">No — screenshot</text>
      <text x="566" y="970" font-size="11" fill="#993556">→ back to Claude</text>
      <text x="566" y="984" font-size="11" fill="#993556">→ refine prompt</text>

      <line x1="340" y1="1098" x2="340" y2="1126" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>
      <text x="350" y="1116" font-size="11" fill="rgba(0,0,0,0.35)">Yes</text>

      <text class="step-num" x="202" y="1140" fill="#993556">11</text>
      <g class="node-group" data-tip="CHECKPOINT: Editor sends ALL stills to Sean/Harry before animating anything. Regenerating a still is free — it costs nothing but a few minutes. Regenerating animated clips costs significant time and credits.<br><br>Sean checks: does the visual match the script? Is the style consistent across scenes? Are characters recognisable?" onclick="tip(this,event)">
        <rect x="190" y="1126" width="300" height="52" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="1"/>
        <text x="340" y="1148" text-anchor="middle" font-size="13" font-weight="500" fill="#4B1528">Sean reviews all stills</text>
        <text x="340" y="1165" text-anchor="middle" font-size="11" fill="#72243E">CHECKPOINT — before animation starts</text>
      </g>

      <line x1="340" y1="1178" x2="340" y2="1210" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <!-- ========== PHASE 5 — ANIMATION ========== -->
      <text class="phase-label" x="40" y="1232" fill="rgba(0,0,0,0.35)">Phase 5 — Animation</text>

      <text class="step-num" x="152" y="1256" fill="#185FA5">12</text>
      <g class="node-group" data-tip="Upload the still as the reference frame. Write ONE simple animation prompt yourself:<br><br>Subject + verb + object. Nothing else.<br>Example: 'The pea pumps the bicycle pump slowly. Gas bubbles rise.'<br><br>Settings: 5-8 seconds. Low motion. No camera movement.<br><br>Primary tool: Seedance 1.5 Pro. Also test Kling 2.5 and Veo 3 — different models work better for different scenes.<br><br>⚠️ DO NOT use Claude to write animation prompts. Claude writes prompts that are too detailed and cause jittery, conflicting output. Keep animation prompts short and simple — write them yourself.<span class='why'>WHY: Video models can only handle one clear action. Multiple instructions fight each other. 'No camera movement' prevents the model from adding random zooms/pans that make the clip unusable. 5-8 seconds is the sweet spot — shorter clips are easier to control and stitch.</span>" onclick="tip(this,event)">
        <rect x="140" y="1242" width="400" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
        <text x="340" y="1264" text-anchor="middle" font-size="13" font-weight="500" fill="#042C53">Animate in Seedance 1.5 Pro</text>
        <text x="340" y="1281" text-anchor="middle" font-size="11" fill="#185FA5">Simple prompt · 5-8s · no camera · also test Kling / Veo 3</text>
      </g>

      <line x1="340" y1="1294" x2="340" y2="1322" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <text class="step-num" x="202" y="1336" fill="#993556">13</text>
      <g class="node-group" data-tip="Watch the clip. Check for: jittery motion, conflicting actions, character morphing, wrong movement.<br><br>If wrong — screenshot the bad frame OR describe the problem in words. Go back to Claude. Claude will help you simplify the animation prompt. Then re-animate with the new prompt.<br><br>⚠️ The screenshot goes to CLAUDE, not back into Seedance/Kling. Claude fixes the prompt. Then you paste the fixed prompt into the video tool.<span class='why'>WHY: Re-animating with the same prompt gives you variations of the same problem. You need Claude to diagnose what went wrong and simplify the instruction.</span>" onclick="tip(this,event)">
        <rect x="190" y="1322" width="300" height="52" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
        <text x="340" y="1344" text-anchor="middle" font-size="13" font-weight="500" fill="#4B1528">Happy with animation?</text>
        <text x="340" y="1361" text-anchor="middle" font-size="11" fill="#72243E">Screenshot problem → Claude fixes prompt</text>
      </g>

      <line x1="490" y1="1348" x2="560" y2="1348" stroke="#993556" stroke-width="0.8"/>
      <line x1="560" y1="1348" x2="560" y2="1268" stroke="#993556" stroke-width="0.8"/>
      <line x1="560" y1="1268" x2="542" y2="1268" stroke="#993556" stroke-width="0.8" marker-end="url(#arr)"/>
      <text x="566" y="1308" font-size="11" fill="#993556">No — screenshot</text>
      <text x="566" y="1322" font-size="11" fill="#993556">→ back to Claude</text>

<script>
const tooltip = document.getElementById('tooltip');
let active = null;
function tip(el, e) {
  const msg = el.getAttribute('data-tip');
  if (active === el) { tooltip.classList.remove('show'); active = null; return; }
  active = el;
  tooltip.innerHTML = '<strong>' + el.querySelector('text').textContent + '</strong>' + msg;
  tooltip.classList.add('show');
  const svg = document.getElementById('flowsvg');
  const rect = svg.getBoundingClientRect();
  const wrap = svg.closest('.flow').getBoundingClientRect();
  const scaleX = rect.width / 680;
  const scaleY = rect.height / 1900;
  const nodeRect = el.querySelector('rect');
  const nx = parseFloat(nodeRect.getAttribute('x'));
  const ny = parseFloat(nodeRect.getAttribute('y'));
  const nw = parseFloat(nodeRect.getAttribute('width'));
  let left = (nx + nw / 2) * scaleX - 140;
  let top = ny * scaleY - 100 + (rect.top - wrap.top);
  left = Math.max(0, Math.min(left, wrap.width - 310));
  top = Math.max(0, top);
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.node-group')) { tooltip.classList.remove('show'); active = null; }
});
</script>
