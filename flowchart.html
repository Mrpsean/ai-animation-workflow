<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixar Animation Workflow</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff; color: #1a1a1a; min-height: 100vh; padding: 32px 16px 64px; }
.wrap { max-width: 800px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 8px; color: #f0ede8; }
.subtitle { font-size: 14px; color: rgba(0,0,0,0.45); margin-bottom: 28px; }

.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; }
.leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(0,0,0,0.45); }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.flow { position: relative; }
svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.node-group { cursor: pointer; }
.node-group:hover rect { opacity: 0.85; }

.tooltip {
  position: absolute; background: #ffffff;
  border: 0.5px solid rgba(0,0,0,0.15);
  border-radius: 8px; padding: 10px 14px;
  font-size: 12px; line-height: 1.5;
  max-width: 220px; pointer-events: none;
  color: #f0ede8; display: none; z-index: 10;
}
.tooltip.show { display: block; }
.tooltip strong { font-weight: 500; display: block; margin-bottom: 4px; font-size: 13px; }
.phase-label { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.hint { font-size: 12px; color: rgba(0,0,0,0.4); margin-top: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Pixar Animation Workflow</h1>
  <p class="subtitle">Click any node for details on that step.</p>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#7F77DD"></div> Sean (strategy)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#1D9E75"></div> Claude (AI)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#BA7517"></div> Nano-Banana</div>
    <div class="leg-item"><div class="leg-dot" style="background:#185FA5"></div> Video tool</div>
    <div class="leg-item"><div class="leg-dot" style="background:#993556"></div> Review / decision</div>
    <div class="leg-item"><div class="leg-dot" style="background:#888780"></div> Output</div>
  </div>

  <div class="flow">
    <svg width="100%" viewBox="0 0 680 1420" id="flowsvg">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- PHASE 1 -->
      <text class="phase-label" x="40" y="32" fill="rgba(0,0,0,0.35)">Phase 1 — research</text>

      <g class="node-group" data-tip="Find a Pixar-style organic video performing well on TikTok, Reels or YouTube Shorts. Download it." onclick="tip(this,event)">
        <rect x="40" y="44" width="280" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
        <text x="180" y="66" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Find reference video</text>
        <text x="180" y="83" text-anchor="middle" font-size="11" fill="#534AB7">TikTok / Reels / YouTube</text>
      </g>

      <g class="node-group" data-tip="Screenshot any frame with a character or visual that sparks an idea. You don't need to break down the whole video." onclick="tip(this,event)">
        <rect x="360" y="44" width="280" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
        <text x="500" y="66" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Screenshot inspiration frames</text>
        <text x="500" y="83" text-anchor="middle" font-size="11" fill="#534AB7">Visual / character ideas only</text>
      </g>

      <line x1="180" y1="96" x2="180" y2="128" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>
      <line x1="500" y1="96" x2="500" y2="128" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <g class="node-group" data-tip="Upload the video to Google AI Studio. Paste the breakdown prompt. Save the output — this is the structural blueprint for the script." onclick="tip(this,event)">
        <rect x="40" y="128" width="280" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
        <text x="180" y="150" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Google AI Studio breakdown</text>
        <text x="180" y="167" text-anchor="middle" font-size="11" fill="#534AB7">Structure / arc / pacing</text>
      </g>

      <g class="node-group" data-tip="Upload the inspiration screenshots into Claude — not Nano-Banana. Claude looks at them and writes prompts inspired by what it sees." onclick="tip(this,event)">
        <rect x="360" y="128" width="280" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
        <text x="500" y="150" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Upload screenshots to Claude</text>
        <text x="500" y="167" text-anchor="middle" font-size="11" fill="#0F6E56">Not Nano-Banana — Claude first</text>
      </g>

      <line x1="180" y1="180" x2="180" y2="220" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
      <line x1="500" y1="180" x2="500" y2="220" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
      <line x1="180" y1="220" x2="330" y2="220" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
      <line x1="500" y1="220" x2="350" y2="220" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
      <line x1="340" y1="220" x2="340" y2="248" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <!-- PHASE 2 -->
      <text class="phase-label" x="40" y="274" fill="rgba(0,0,0,0.35)">Phase 2 — script</text>

      <g class="node-group" data-tip="Claude reads the breakdown(s), views the screenshots, and draws on Supply Life brand knowledge to write a 10-scene script. One punchy line per scene." onclick="tip(this,event)">
        <rect x="140" y="284" width="400" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
        <text x="340" y="306" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Claude writes the script</text>
        <text x="340" y="323" text-anchor="middle" font-size="11" fill="#0F6E56">Structure from A + visual from B + brand knowledge</text>
      </g>

      <line x1="340" y1="336" x2="340" y2="364" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <g class="node-group" data-tip="Sean reviews and locks the script. The editor receives a locked version — they never write or edit the script." onclick="tip(this,event)">
        <rect x="190" y="364" width="300" height="52" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
        <text x="340" y="386" text-anchor="middle" font-size="13" font-weight="500" fill="#4B1528">Sean reviews &amp; locks script</text>
        <text x="340" y="403" text-anchor="middle" font-size="11" fill="#72243E">Handed to editor as locked doc</text>
      </g>

      <line x1="340" y1="416" x2="340" y2="444" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <!-- PHASE 3 -->
      <text class="phase-label" x="40" y="466" fill="rgba(0,0,0,0.35)">Phase 3 — character creation</text>

      <g class="node-group" data-tip="Upload the real product image to Nano-Banana. Prompt: turn this into a Pixar character. Generate 3 versions. Pick the strongest. This output becomes the character reference." onclick="tip(this,event)">
        <rect x="140" y="476" width="400" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
        <text x="340" y="498" text-anchor="middle" font-size="13" font-weight="500" fill="#412402">Upload product → Nano-Banana</text>
        <text x="340" y="515" text-anchor="middle" font-size="11" fill="#854F0B">"Turn this into a Pixar character"</text>
      </g>

      <line x1="340" y1="528" x2="340" y2="556" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <g class="node-group" data-tip="Review the output. If the character looks wrong — screenshot it, go back to Claude, describe the problem, get a refined prompt, regenerate." onclick="tip(this,event)">
        <rect x="190" y="556" width="300" height="52" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
        <text x="340" y="578" text-anchor="middle" font-size="13" font-weight="500" fill="#4B1528">Happy with character?</text>
        <text x="340" y="595" text-anchor="middle" font-size="11" fill="#72243E">Feedback loop if wrong</text>
      </g>

      <line x1="490" y1="582" x2="560" y2="582" stroke="#993556" stroke-width="0.8"/>
      <line x1="560" y1="582" x2="560" y2="502" stroke="#993556" stroke-width="0.8"/>
      <line x1="560" y1="502" x2="542" y2="502" stroke="#993556" stroke-width="0.8" marker-end="url(#arr)"/>
      <text x="566" y="548" font-size="11" fill="#993556">No — screenshot</text>
      <text x="566" y="562" font-size="11" fill="#993556">→ Claude refines</text>

      <line x1="340" y1="608" x2="340" y2="636" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>
      <text x="350" y="626" font-size="11" fill="rgba(0,0,0,0.35)">Yes — save output</text>

      <!-- PHASE 4 -->
      <text class="phase-label" x="40" y="658" fill="rgba(0,0,0,0.35)">Phase 4 — image generation (per scene)</text>

      <g class="node-group" data-tip="For every scene line, ask Claude: 'Give me 3 creative different visual variations for a Nano-Banana first frame prompt for this line.' Never ask for 1 — always 3." onclick="tip(this,event)">
        <rect x="140" y="668" width="400" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
        <text x="340" y="690" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Ask Claude for 3 visual options</text>
        <text x="340" y="707" text-anchor="middle" font-size="11" fill="#0F6E56">Per scene line — always 3, never 1</text>
      </g>

      <line x1="340" y1="720" x2="340" y2="748" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <g class="node-group" data-tip="Read all 3 options carefully before deciding. The strongest option is not always predictable — don't just default to the first one." onclick="tip(this,event)">
        <rect x="190" y="748" width="300" height="52" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
        <text x="340" y="770" text-anchor="middle" font-size="13" font-weight="500" fill="#4B1528">Pick strongest visual concept</text>
        <text x="340" y="787" text-anchor="middle" font-size="11" fill="#72243E">Read all 3 — not always predictable</text>
      </g>

      <line x1="340" y1="800" x2="340" y2="828" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <g class="node-group" data-tip="Paste Claude's chosen prompt into Nano-Banana Pro at 2K quality. Generate 2-3 versions. Keep all key action centred in frame." onclick="tip(this,event)">
        <rect x="140" y="828" width="400" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
        <text x="340" y="850" text-anchor="middle" font-size="13" font-weight="500" fill="#412402">Generate still in Nano-Banana Pro</text>
        <text x="340" y="867" text-anchor="middle" font-size="11" fill="#854F0B">Pro · 2K quality · action centred</text>
      </g>

      <line x1="340" y1="880" x2="340" y2="908" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <g class="node-group" data-tip="If the output looks wrong — wrong colours, missing elements, character off — screenshot it, go back to Claude, describe the problem, refine the prompt, regenerate." onclick="tip(this,event)">
        <rect x="190" y="908" width="300" height="52" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
        <text x="340" y="930" text-anchor="middle" font-size="13" font-weight="500" fill="#4B1528">Happy with still?</text>
        <text x="340" y="947" text-anchor="middle" font-size="11" fill="#72243E">Feedback loop if wrong</text>
      </g>

      <line x1="490" y1="934" x2="560" y2="934" stroke="#993556" stroke-width="0.8"/>
      <line x1="560" y1="934" x2="560" y2="694" stroke="#993556" stroke-width="0.8"/>
      <line x1="560" y1="694" x2="542" y2="694" stroke="#993556" stroke-width="0.8" marker-end="url(#arr)"/>
      <text x="566" y="820" font-size="11" fill="#993556">No — screenshot</text>
      <text x="566" y="834" font-size="11" fill="#993556">→ Claude refines</text>

      <line x1="340" y1="960" x2="340" y2="988" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>
      <text x="350" y="978" font-size="11" fill="rgba(0,0,0,0.35)">Yes</text>

      <g class="node-group" data-tip="REVIEW CHECKPOINT: Editor sends all stills to Sean before animating. Regenerating a still costs nothing. Regenerating animated clips costs time." onclick="tip(this,event)">
        <rect x="190" y="988" width="300" height="52" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="1"/>
        <text x="340" y="1010" text-anchor="middle" font-size="13" font-weight="500" fill="#4B1528">Sean reviews all stills</text>
        <text x="340" y="1027" text-anchor="middle" font-size="11" fill="#72243E">Checkpoint before animation</text>
      </g>

      <line x1="340" y1="1040" x2="340" y2="1068" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <!-- PHASE 5 -->
      <text class="phase-label" x="40" y="1090" fill="rgba(0,0,0,0.35)">Phase 5 — animation</text>

      <g class="node-group" data-tip="Upload the still as the reference frame. Write one simple action: subject + verb + object. No camera movement. 5 seconds. Low motion. Seedance 1.5 Pro is primary — also test Kling 2.5 and Veo 3." onclick="tip(this,event)">
        <rect x="140" y="1100" width="400" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
        <text x="340" y="1122" text-anchor="middle" font-size="13" font-weight="500" fill="#042C53">Animate in Seedance 1.5 Pro</text>
        <text x="340" y="1139" text-anchor="middle" font-size="11" fill="#185FA5">One action · 5s · low motion · also test Kling / Veo 3</text>
      </g>

      <line x1="340" y1="1152" x2="340" y2="1180" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <g class="node-group" data-tip="If the clip is jittery, conflicting motions, or wrong action — screenshot or describe it to Claude. Claude rewrites the animation prompt. Reanimate." onclick="tip(this,event)">
        <rect x="190" y="1180" width="300" height="52" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
        <text x="340" y="1202" text-anchor="middle" font-size="13" font-weight="500" fill="#4B1528">Happy with animation?</text>
        <text x="340" y="1219" text-anchor="middle" font-size="11" fill="#72243E">Feedback loop if wrong</text>
      </g>

      <line x1="490" y1="1206" x2="560" y2="1206" stroke="#993556" stroke-width="0.8"/>
      <line x1="560" y1="1206" x2="560" y2="1126" stroke="#993556" stroke-width="0.8"/>
      <line x1="560" y1="1126" x2="542" y2="1126" stroke="#993556" stroke-width="0.8" marker-end="url(#arr)"/>
      <text x="566" y="1170" font-size="11" fill="#993556">No — describe</text>
      <text x="566" y="1184" font-size="11" fill="#993556">→ Claude refines</text>

      <line x1="340" y1="1232" x2="340" y2="1260" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <!-- PHASE 6 -->
      <text class="phase-label" x="40" y="1282" fill="rgba(0,0,0,0.35)">Phase 6 — finish</text>

      <g class="node-group" data-tip="Add voiceover. Play it back. If it sounds robotic — run through ElevenLabs Voice Changer. Seedance dialogue prompts sometimes produce strong voice automatically — check before using ElevenLabs." onclick="tip(this,event)">
        <rect x="140" y="1292" width="400" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
        <text x="340" y="1314" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">Add voiceover</text>
        <text x="340" y="1331" text-anchor="middle" font-size="11" fill="#5F5E5A">ElevenLabs Voice Changer if sounds off</text>
      </g>

      <line x1="340" y1="1344" x2="340" y2="1372" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arr)"/>

      <g class="node-group" data-tip="Stitch all scenes in order. Karaoke captions — white text, black outline, 60-70% down the frame. Export at both 9:16 (1080x1920) and 4:5 (1080x1350)." onclick="tip(this,event)">
        <rect x="140" y="1372" width="400" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
        <text x="340" y="1394" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">Stitch · caption · export</text>
        <text x="340" y="1411" text-anchor="middle" font-size="11" fill="#5F5E5A">9:16 and 4:5 · white captions · black outline</text>
      </g>
    </svg>
    <div class="tooltip" id="tooltip"></div>
  </div>
  <p class="hint">Click any node for details on that step.</p>
</div>

<script>
const tooltip = document.getElementById('tooltip');
let active = null;
function tip(el, e) {
  const msg = el.getAttribute('data-tip');
  if (active === el) { tooltip.classList.remove('show'); active = null; return; }
  active = el;
  tooltip.innerHTML = '<strong>' + el.querySelector('text').textContent + '</strong>' + msg;
  tooltip.classList.add('show');
  const svg = document.getElementById('flowsvg');
  const rect = svg.getBoundingClientRect();
  const wrap = svg.closest('.flow').getBoundingClientRect();
  const scaleX = rect.width / 680;
  const scaleY = rect.height / 1420;
  const nodeRect = el.querySelector('rect');
  const nx = parseFloat(nodeRect.getAttribute('x'));
  const ny = parseFloat(nodeRect.getAttribute('y'));
  const nw = parseFloat(nodeRect.getAttribute('width'));
  let left = (nx + nw / 2) * scaleX - 110;
  let top = ny * scaleY - 90 + (rect.top - wrap.top);
  left = Math.max(0, Math.min(left, wrap.width - 230));
  top = Math.max(0, top);
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.node-group')) { tooltip.classList.remove('show'); active = null; }
});
</script>
</body>
</html>
