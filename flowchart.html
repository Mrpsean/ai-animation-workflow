<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixar Animation Workflow</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F4EF; color: #1a1a1a; min-height: 100vh; }

.page { display: flex; height: 100vh; overflow: hidden; }

/* LEFT — flowchart */
.flow-col {
  flex: 1; min-width: 0;
  padding: 28px 24px 64px;
  overflow-y: auto;
}
h1 { font-size: 20px; font-weight: 500; margin-bottom: 2px; }
.subtitle { font-size: 13px; color: rgba(0,0,0,0.4); margin-bottom: 16px; }

.legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(0,0,0,0.4); }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.node-group { cursor: pointer; transition: opacity 0.1s; }
.node-group:hover rect { opacity: 0.85; }
.node-group.active rect { stroke-width: 2 !important; }
.phase-label { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.parallel-label { font-size: 10px; letter-spacing: 0.03em; text-transform: uppercase; }
.step-num { font-size: 11px; font-weight: 600; }

/* RIGHT — detail panel */
.detail-col {
  width: 420px; flex-shrink: 0;
  background: #fff;
  border-left: 1px solid #e0e0e0;
  overflow-y: auto;
  transition: transform 0.2s ease, opacity 0.2s ease;
  padding: 28px 24px;
}
.detail-col.hidden {
  transform: translateX(100%);
  opacity: 0;
  pointer-events: none;
  position: absolute; right: 0; top: 0; bottom: 0;
}
.detail-col.show {
  transform: translateX(0);
  opacity: 1;
  pointer-events: auto;
  position: relative;
}

.detail-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.detail-step-badge { font-size: 12px; font-weight: 600; color: #7F77DD; background: #EEEDFE; padding: 3px 10px; border-radius: 5px; }
.detail-close { cursor: pointer; font-size: 20px; color: #999; background: none; border: none; line-height: 1; padding: 4px; }
.detail-close:hover { color: #333; }

.detail-title { font-size: 17px; font-weight: 600; color: #111; margin-bottom: 10px; }
.detail-instruction { font-size: 14px; color: #333; line-height: 1.55; margin-bottom: 20px; }

.detail-images { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 6px; }
.detail-img-wrap { display: flex; flex-direction: column; flex-shrink: 0; }
.detail-images img { height: 180px; border-radius: 8px; border: 1px solid #eee; cursor: pointer; transition: transform 0.15s; }
.detail-images img:hover { transform: scale(1.03); }
.img-label { font-size: 11px; color: rgba(0,0,0,0.4); text-align: center; margin-top: 4px; }

.detail-links { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.detail-links a {
  font-size: 13px; color: #185FA5; text-decoration: none;
  padding: 7px 14px; border: 1px solid #185FA5; border-radius: 6px;
  transition: background 0.1s;
}
.detail-links a:hover { background: #E6F1FB; }

.detail-tip { font-size: 12px; color: #888; font-style: italic; line-height: 1.5; padding: 12px 14px; background: #FAFAF7; border-radius: 6px; border-left: 3px solid #ddd; }

/* Empty state */
.detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: rgba(0,0,0,0.25); }
.detail-empty-icon { font-size: 40px; margin-bottom: 12px; }
.detail-empty-text { font-size: 14px; }

/* Image lightbox */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; cursor: zoom-out; }
.lightbox.show { display: flex; }
.lightbox img { max-height: 90vh; max-width: 90vw; border-radius: 8px; }

.hint { font-size: 11px; color: rgba(0,0,0,0.3); margin-top: 16px; }

/* Responsive — stack on small screens */
@media (max-width: 900px) {
  .page { flex-direction: column; height: auto; overflow: visible; }
  .flow-col { overflow: visible; }
  .detail-col { width: 100%; border-left: none; border-top: 1px solid #e0e0e0; position: relative !important; }
  .detail-col.hidden { display: none; transform: none; }
  .detail-col.show { display: block; transform: none; }
}
</style>
</head>
<body>

<div class="page">
  <!-- LEFT: FLOWCHART -->
  <div class="flow-col">
    <h1>Pixar Animation Workflow</h1>
    <p class="subtitle">Click any step to see details, screenshots, and tool links.</p>

    <div class="legend">

  <div class="detail-col hidden" id="detail-col">
    <div class="detail-top">

    <div id="detail-links-container"></div>
    <div id="detail-tip-container"></div>

</div>

<!-- Image lightbox -->

    links: [

  'step-6': {

    instruction: 'Check: limb colour (cardboard, NOT gold/metallic), branding text, proportions, expression. If wrong — screenshot the bad output, send to Claude, describe the problem, get a fixed prompt.',

    instruction: 'For every script line, ask: "Give me 3 creative different visual variations for a Nano-Banana image prompt for this script line: [paste line]." You can ask for more than 3.',
    images: [

    images: [
      { src: 'images/hook-gluten.png', label: 'Hook' },

function showDetail(stepId) {
  if (activeStep === stepId) { closeDetail(); return; }

  // Remove active state from previous node
  if (activeNode) activeNode.classList.remove('active');

  activeStep = stepId;
  const s = steps[stepId];
  if (!s) return;

  // Highlight active node
  const node = document.querySelector(`[data-step="${stepId}"]`);
  if (node) { node.classList.add('active'); activeNode = node; }

  // Populate panel
  document.getElementById('detail-badge').textContent = 'Step ' + s.step;
  document.getElementById('detail-title').textContent = s.title;
  document.getElementById('detail-instruction').textContent = s.instruction;

  // Images
  const imgContainer = document.getElementById('detail-images-container');
  if (s.images && s.images.length) {
    let html = '<div class="detail-images">';
    s.images.forEach(img => {
      html += '<div class="detail-img-wrap"><img src="' + img.src + '" alt="' + img.label + '" loading="lazy" onclick="openLightbox(\'' + img.src + '\')"><div class="img-label">' + img.label + '</div></div>';
    });
    html += '</div>';
    imgContainer.innerHTML = html;
  } else {
    imgContainer.innerHTML = '';
  }

  // Links
  const linkContainer = document.getElementById('detail-links-container');
  if (s.links && s.links.length) {
    let html = '<div class="detail-links">';
    s.links.forEach(link => {
      html += '<a href="' + link.url + '" target="_blank">' + link.label + ' &#x2197;</a>';
    });
    html += '</div>';
    linkContainer.innerHTML = html;
  } else {
    linkContainer.innerHTML = '';
  }

  // Tip
  const tipContainer = document.getElementById('detail-tip-container');
  if (s.tip) {
    tipContainer.innerHTML = '<div class="detail-tip">' + s.tip + '</div>';
  } else {
    tipContainer.innerHTML = '';
  }

  detailCol.classList.remove('hidden');
  detailCol.classList.add('show');
}

function closeDetail() {
  detailCol.classList.remove('show');
  detailCol.classList.add('hidden');
  if (activeNode) activeNode.classList.remove('active');
  activeStep = null;
  activeNode = null;
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLightbox(); closeDetail(); }
});
</script>
</body>
</html>
