<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixar Animation Workflow</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F4EF; color: #1a1a1a; min-height: 100vh; padding: 32px 16px 64px; }
.wrap { max-width: 800px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; color: #1a1a1a; }
.subtitle { font-size: 14px; color: rgba(0,0,0,0.45); margin-bottom: 24px; }

.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
.leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(0,0,0,0.45); }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.flow { position: relative; }
svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.node-group { cursor: pointer; }
.node-group:hover rect { opacity: 0.85; }
.phase-label { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.parallel-label { font-size: 10px; letter-spacing: 0.03em; text-transform: uppercase; }
.step-num { font-size: 11px; font-weight: 600; }

/* Detail panel — replaces tooltip */
.detail-panel {
  display: none;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 20px 24px;
  margin-top: 20px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.1);
  animation: fadeIn 0.15s ease;
}
.detail-panel.show { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.detail-title { font-size: 15px; font-weight: 600; color: #111; }
.detail-step { font-size: 12px; font-weight: 600; color: #7F77DD; background: #EEEDFE; padding: 2px 8px; border-radius: 4px; }
.detail-instruction { font-size: 14px; color: #333; line-height: 1.5; margin-bottom: 16px; }
.detail-close { position: absolute; top: 12px; right: 16px; cursor: pointer; font-size: 18px; color: #999; background: none; border: none; }
.detail-close:hover { color: #333; }

.detail-images { display: flex; gap: 12px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 4px; }
.detail-images img { height: 200px; border-radius: 8px; border: 1px solid #eee; flex-shrink: 0; }
.detail-images .img-label { font-size: 11px; color: rgba(0,0,0,0.4); text-align: center; margin-top: 4px; }
.detail-img-wrap { display: flex; flex-direction: column; flex-shrink: 0; }

.detail-links { display: flex; gap: 10px; flex-wrap: wrap; }
.detail-links a {
  font-size: 13px; color: #185FA5; text-decoration: none;
  padding: 6px 14px; border: 1px solid #185FA5; border-radius: 6px;
  transition: background 0.1s;
}
.detail-links a:hover { background: #E6F1FB; }

.detail-tip { font-size: 12px; color: #888; margin-top: 12px; font-style: italic; }

.hint { font-size: 12px; color: rgba(0,0,0,0.4); margin-top: 12px; }
</style>
</head>
<body>

<script>
const panel = document.getElementById('detail-panel');
const content = document.getElementById('detail-content');
let activeStep = null;

const steps = {
  'step-1a': {
    step: '1a', title: 'Find reference video',
    instruction: 'Find a Pixar-style animated video performing well on TikTok, Reels or YouTube Shorts. Download it.',
    images: [
      { src: 'images/ref-banana.png', label: 'Example: viral organic Pixar animation' }
    ],
    tip: 'This video becomes the structural blueprint — your ad will follow its pacing, arc and scene count.'
  },
  'step-1b': {
    step: '1b', title: 'Screenshot inspiration frames',
    instruction: 'Screenshot any frames with characters or visual styles you like. Just the frames that spark ideas — not the full video.',
    images: [
      { src: 'images/hook-gluten.png', label: 'Muscular gluten character' },
      { src: 'images/villain-oats.png', label: 'Oats villain in gut tunnel' },
      { src: 'images/villain-peas.png', label: 'Peas on bicycle pump' }
    ],
    tip: 'These screenshots are what Claude uses later to write Nano-Banana prompts. No screenshots = generic output.'
  },
  'step-1c': {
    step: '1c', title: 'Google AI Studio breakdown',
    instruction: 'Upload the reference video to Google AI Studio. Paste the forensic breakdown prompt. Save the full output.',
    links: [
      { url: 'https://aistudio.google.com/', label: 'Open Google AI Studio' }
    ],
    tip: 'Claude can\'t watch videos — Google AI Studio can. It extracts the structure, timing, and emotional arc that Claude needs to write the script.'
  },
  'step-1d': {
    step: '1d', title: 'Upload screenshots to Claude',
    instruction: 'Upload the inspiration screenshots into Claude. NOT Nano-Banana. Claude needs to see the visual style before it writes prompts.',
    links: [
      { url: 'https://claude.ai/', label: 'Open Claude' }
    ],
    tip: 'Without screenshots, Claude guesses the style and the prompts come out generic.'
  },
  'step-2': {
    step: '2', title: 'Prime Claude with brand knowledge',
    instruction: 'First time only: feed Claude product info, previous scripts, brand voice examples, the Supply Life box reference, and past ad breakdowns. Skip this if your Claude project is already trained.',

function showDetail(stepId) {
  if (activeStep === stepId) { closeDetail(); return; }
  activeStep = stepId;
  const s = steps[stepId];
  if (!s) return;

  let html = '<div class="detail-header">';
  html += '<div class="detail-title">' + s.title + '</div>';
  html += '<div class="detail-step">Step ' + s.step + '</div>';
  html += '</div>';
  html += '<div class="detail-instruction">' + s.instruction + '</div>';

  if (s.images && s.images.length) {
    html += '<div class="detail-images">';
    s.images.forEach(img => {
      html += '<div class="detail-img-wrap"><img src="' + img.src + '" alt="' + img.label + '" loading="lazy"><div class="img-label">' + img.label + '</div></div>';
    });
    html += '</div>';
  }

  if (s.links && s.links.length) {
    html += '<div class="detail-links">';
    s.links.forEach(link => {
      html += '<a href="' + link.url + '" target="_blank">' + link.label + ' &#x2197;</a>';
    });
    html += '</div>';
  }

  if (s.tip) {
    html += '<div class="detail-tip">' + s.tip + '</div>';
  }

  content.innerHTML = html;
  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeDetail() {
  panel.classList.remove('show');
  activeStep = null;
}
